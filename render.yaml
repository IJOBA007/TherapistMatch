services:
  - type: web
    name: therapist-match
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn -w 1 --worker-class eventlet -b 0.0.0.0:$PORT app:app
    healthCheckPath: /healthz
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: ADMIN_SIGNUP_CODE
        sync: false
